services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wmbench
      POSTGRES_USER: wmbench
      POSTGRES_PASSWORD: wmbench
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../apps/api/app/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://wmbench:wmbench@postgres:5432/wmbench
      REDIS_URL: redis://redis:6379/0
      WM_BENCH_DATA_ROOT: /data/wm-bench
      WM_BENCH_RESOURCES_ROOT: /data/wm-bench/resources
      WM_BENCH_RUNS_ROOT: /data/wm-bench/runs
      WM_BENCH_DB_PATH: /data/wm-bench/state/wmbench.sqlite
      WM_BENCH_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - wmbench-data:/data/wm-bench
    depends_on:
      - postgres
      - redis

  worker-cpu:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_QUEUE: cpu
      WM_BENCH_DATA_ROOT: /data/wm-bench
      WM_BENCH_RESOURCES_ROOT: /data/wm-bench/resources
      WM_BENCH_RUNS_ROOT: /data/wm-bench/runs
      WM_BENCH_DB_PATH: /data/wm-bench/state/wmbench.sqlite
    volumes:
      - wmbench-data:/data/wm-bench
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis

  worker-gpu:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_QUEUE: gpu
      WM_BENCH_DATA_ROOT: /data/wm-bench
      WM_BENCH_RESOURCES_ROOT: /data/wm-bench/resources
      WM_BENCH_RUNS_ROOT: /data/wm-bench/runs
      WM_BENCH_DB_PATH: /data/wm-bench/state/wmbench.sqlite
    volumes:
      - wmbench-data:/data/wm-bench
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - redis

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  wmbench-data:
